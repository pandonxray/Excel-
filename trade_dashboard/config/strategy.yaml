    formula: (DATE_INT < 20250401) * (PP05 - FEI05 * USDCHY * 1.01 * 1.09 * 1.17) + (DATE_INT >= 20250401) * (PP05 - FEI05 * USDCHY * 1.11 * 1.09 * 1.17)
