strategies:
  - name: PP01_L01_spread
    formula: PP01 - L01
    enabled: true
    category: PP-L
    notes: PP01 minus L01

  - name: PP05_L05_spread
    formula: PP05 - L05
    enabled: true
    category: PP-L
    notes: PP05 minus L05

  - name: PP09_L09_spread
    formula: PP09 - L09
    enabled: true
    category: PP-L
    notes: PP09 minus L09

  - name: Domestic_PDH_01
    formula: PP01 - 1.18 * LPG01
    enabled: true
    category: Domestic_PDH
    notes: Uses LPG01 as the propane leg

  - name: Domestic_PDH_05
    formula: PP05 - 1.18 * LPG05
    enabled: true
    category: Domestic_PDH
    notes: Uses LPG05 as the propane leg

  - name: Domestic_PDH_09
    formula: PP09 - 1.18 * LPG09
    enabled: true
    category: Domestic_PDH
    notes: Uses LPG09 as the propane leg

  - name: FEI_PDH_01
    formula: (DATE_INT < 20250401) * (PP01 - FEI01 * USDCHY * 1.01 * 1.09 * 1.17) + (DATE_INT >= 20250401) * (PP01 - FEI01 * USDCHY * 1.11 * 1.09 * 1.17)
    enabled: true
    category: FEI_PDH
    notes: FEI 01 with different tariff coefficients before and after 2025-04-01
    decomposition:
      type: spread
      target_label: FEI PDH 01
      target_expr: domestic_pp - fei * fx * tariff * vat * yield_factor
      components:
        - key: domestic_pp
          label: PP01
          expr: PP01
        - key: fei
          label: FEI01
          expr: FEI01
        - key: fx
          label: USDCHY
          expr: USDCHY
        - key: tariff
          label: Tariff
          expr: (DATE_INT < 20250401) * 1.01 + (DATE_INT >= 20250401) * 1.11
        - key: vat
          label: VAT
          expr: 1.09
        - key: yield_factor
          label: Yield factor
          expr: 1.17
      derived:
        - key: import_cost
          label: Imported PDH cost
          expr: fei * fx * tariff * vat * yield_factor

